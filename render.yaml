envVarGroups:
  - name: shared-infra
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # SHARED SECRETS: Set these in Render Dashboard -> Env Groups
      - key: RABBITMQ_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GATEWAY_INTERNAL_SECRET
        sync: false

services:
  # ─── Kong API Gateway ────────────────────────────────────────────────────────
  - type: web
    name: kong-gateway
    runtime: docker
    dockerContext: apps/kong-gateway
    dockerfilePath: apps/kong-gateway/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    # Kong's built-in status endpoint — does NOT require a route in kong.yml
    healthCheckPath: /status
    buildFilter:
      paths:
        - apps/kong-gateway/**
    envVars:
      - key: KONG_DATABASE
        value: "off"
      - key: KONG_DECLARATIVE_CONFIG
        value: /etc/kong/kong.yml
      - key: KONG_PROXY_LISTEN
        value: 0.0.0.0:10000
      - key: KONG_ADMIN_LISTEN
        value: 127.0.0.1:8001
      - key: KONG_STATUS_LISTEN
        value: 0.0.0.0:8100
      # ─────────────────────────────────────
      # MEMORY OPTIMIZATIONS (Render Free 512MB)
      # ─────────────────────────────────────
      - key: KONG_NGINX_WORKER_PROCESSES
        value: "1" # Default is 'auto' (one per core), each worker consumes ~60-100MB
      - key: KONG_MEM_CACHE_SIZE
        value: "32m" # Reduce internal memory cache
      - key: KONG_LUA_PACKAGE_PATH
        value: "./?.lua;./?/init.lua;;"
      - key: KONG_NGINX_HTTP_CLIENT_BODY_BUFFER_SIZE
        value: "128k" # Reduce request buffering RAM
      - key: KONG_NGINX_HTTP_CLIENT_MAX_BODY_SIZE
        value: "10m"
      - key: KONG_UPSTREAM_KEEPALIVE_POOL_SIZE
        value: "32"
      - key: KONG_DNS_RESOLVER
        value: "8.8.8.8" # Avoid local DNS resolver complexity
      - fromGroup: shared-infra

  # ─── User Service ─────────────────────────────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/user-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/user-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: CLERK_WEBHOOK_SECRET
        sync: false

  # ─── Catalog Service ──────────────────────────────────────────────────────────
  - type: web
    name: catalog-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/catalog-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/catalog-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3005"
      - key: DATABASE_URL
        sync: false

  # ─── Order Service ────────────────────────────────────────────────────────────
  - type: web
    name: order-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/order-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/order-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3002"
      - key: DATABASE_URL
        sync: false
      - key: USER_SERVICE_URL
        # Internal Render URL — replace with actual Render service URL after first deploy
        value: https://user-service.onrender.com

  # ─── Payment Service ──────────────────────────────────────────────────────────
  - type: web
    name: payment-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/payment-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/payment-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3004"
      - key: DATABASE_URL
        sync: false
      - key: ORDER_SERVICE_URL
        # Internal Render URL — replace with actual Render service URL after first deploy
        value: https://order-service.onrender.com

  # ─── Notification Service ─────────────────────────────────────────────────────
  - type: web
    name: notification-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/notification-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/notification-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3005"
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
