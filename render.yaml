envVarGroups:
  - name: shared-infra
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # SHARED SECRETS: Paste these once in Render Dashboard -> Env Groups
      - key: RABBITMQ_URL
        value: "REPLACE_ME"
      - key: CLERK_PUBLISHABLE_KEY
        value: "REPLACE_ME"
      - key: CLERK_SECRET_KEY
        value: "REPLACE_ME"
      - key: SENTRY_DSN
        value: "REPLACE_ME"
      - key: STRIPE_SECRET_KEY
        value: "REPLACE_ME"
      - key: STRIPE_WEBHOOK_SECRET
        value: "REPLACE_ME"

services:
  # API Gateway
  - type: web
    name: api-gateway
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/api-gateway/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/api-gateway/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_TTL
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: USER_SERVICE_URL
        value: http://user-service:3000
      - key: PRODUCT_SERVICE_URL
        value: http://catalog-service:3000
      - key: CATALOG_SERVICE_URL
        value: http://catalog-service:3000
      - key: ORDER_SERVICE_URL
        value: http://order-service:3000
      - key: PAYMENT_SERVICE_URL
        value: http://payment-service:3000
      - key: CART_SERVICE_URL
        value: http://catalog-service:3000
      - key: CLERK_WEBHOOK_SECRET
        sync: false

  # User Service
  - type: web
    name: user-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/user-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/user-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false

  # Catalog Service
  - type: web
    name: catalog-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/catalog-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/catalog-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false

  # Order Service
  - type: web
    name: order-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/order-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/order-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: USER_SERVICE_URL
        value: http://user-service:3000

  # Payment Service
  - type: web
    name: payment-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/payment-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/payment-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: ORDER_SERVICE_URL
        value: http://order-service:3000



