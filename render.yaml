envVarGroups:
  - name: shared-infra
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: RABBITMQ_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY   # ADD
        sync: false
      - key: CLERK_SECRET_KEY        # ADD (shared across services)
        sync: false
      - key: SENTRY_DSN
        sync: false

services:
  # API Gateway
  - type: web
    name: api-gateway
    env: docker
    dockerContext: .
    dockerfilePath: apps/api-gateway/Dockerfile
    plan: free
    region: ohio
    healthCheckPath: /health/live
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        sync: false # Set to your Vercel production URL
      - key: RATE_LIMIT_TTL
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: USER_SERVICE_URL
        fromService:
          name: user-service
          type: web
          property: host
      - key: PRODUCT_SERVICE_URL
        fromService:
          name: catalog-service
          type: web
          property: host
      - key: ORDER_SERVICE_URL
        fromService:
          name: order-service
          type: web
          property: host
      - key: PAYMENT_SERVICE_URL
        fromService:
          name: payment-service
          type: web
          property: host
      - key: CART_SERVICE_URL
        fromService:
          name: order-service
          type: web
          property: host
      - key: CLERK_PUBLISHABLE_KEY
        fromGroup: shared-infra
      - key: CLERK_SECRET_KEY
        fromGroup: shared-infra
      - key: CLERK_WEBHOOK_SECRET
        sync: false    

  # Order Service
  - type: web
    name: order-service
    env: docker
    dockerContext: .
    dockerfilePath: apps/order-service/Dockerfile
    plan: free
    region: ohio
    healthCheckPath: /health/live
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false 
        
  # Catalog Service
  - type: web
    name: catalog-service
    env: docker
    dockerContext: .
    dockerfilePath: apps/catalog-service/Dockerfile
    plan: free
    region: ohio
    healthCheckPath: /health/live
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false 

  # Payment Service
  - type: web
    name: payment-service
    env: docker
    dockerContext: .
    dockerfilePath: apps/payment-service/Dockerfile
    plan: free
    region: ohio
    healthCheckPath: /health/live
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false 
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
    
  # User Service
  - type: web
    name: user-service
    env: docker
    dockerContext: .
    dockerfilePath: apps/user-service/Dockerfile
    plan: free
    region: ohio
    healthCheckPath: /health/live
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false 

      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
