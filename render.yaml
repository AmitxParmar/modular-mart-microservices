envVarGroups:
  - name: shared-infra
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # SHARED SECRETS: Set these in Render Dashboard -> Env Groups
      - key: RABBITMQ_URL
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GATEWAY_INTERNAL_SECRET
        sync: false

services:

  # ─── Kong API Gateway ────────────────────────────────────────────────────────
  - type: web
    name: kong-gateway
    runtime: docker
    dockerContext: apps/kong-gateway
    dockerfilePath: apps/kong-gateway/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    # Custom health check route defined in kong.yml
    healthCheckPath: /healthz
    buildFilter:
      paths:
        - apps/kong-gateway/**
    envVars:
      - key: KONG_DATABASE
        value: "off"
      - key: KONG_DECLARATIVE_CONFIG
        value: /etc/kong/kong.yml
      - key: KONG_PROXY_LISTEN
        value: 0.0.0.0:10000
      - key: KONG_ADMIN_LISTEN
        value: 127.0.0.1:8001
      - key: KONG_STATUS_LISTEN
        value: 0.0.0.0:8100
      - key: KONG_TRUSTED_IPS
        value: "0.0.0.0/0,::/0" # Trust Render's proxy to pass X-Forwarded-For
      - key: KONG_REAL_IP_HEADER
        value: "X-Forwarded-For"
      - key: KONG_REAL_IP_RECURSIVE
        value: "on"
      # ─────────────────────────────────────
      # MEMORY OPTIMIZATIONS (Render Free 512MB)
      # ─────────────────────────────────────
      - key: KONG_NGINX_WORKER_PROCESSES
        value: "1" # Default is 'auto' (one per core), each worker consumes ~60-100MB
      - key: KONG_MEM_CACHE_SIZE
        value: "32m" # Reduce internal memory cache
      - key: KONG_LUA_PACKAGE_PATH
        value: "./?.lua;./?/init.lua;;"
      - key: KONG_NGINX_HTTP_CLIENT_BODY_BUFFER_SIZE
        value: "128k" # Reduce request buffering RAM
      - key: KONG_NGINX_HTTP_CLIENT_MAX_BODY_SIZE
        value: "10m"
      - key: KONG_UPSTREAM_KEEPALIVE_POOL_SIZE
        value: "32"
      # Reduce log-ring-buffer memory; warn level still catches all errors
      - key: KONG_LOG_LEVEL
        value: "warn"
      # Free keepalive connection slots faster (default 75s holds TCP memory)
      - key: KONG_NGINX_HTTP_KEEPALIVE_TIMEOUT
        value: "30"
      # ─────────────────────────────────────
      # SERVICE HOSTNAMES + PORTS for envsubst in entrypoint.sh
      #
      # Set these in the Render Dashboard → kong-gateway → Environment.
      # Use the PUBLIC .onrender.com hostname for each service (without https://).
      # Example: user-service-ov6b.onrender.com
      #
      # fromService.host returns the private cluster slug (user-service-ov6b)
      # which is NOT DNS-resolvable on Render's free plan (no private networking).
      # ─────────────────────────────────────
      - key: UPSTREAM_PROTOCOL
        value: https
      - key: USER_SERVICE_HOST
        sync: false   # e.g. user-service-xxxx.onrender.com
      - key: USER_SERVICE_PORT
        value: "443"
      - key: CATALOG_SERVICE_HOST
        sync: false   # e.g. catalog-service-xxxx.onrender.com
      - key: CATALOG_SERVICE_PORT
        value: "443"
      - key: ORDER_SERVICE_HOST
        sync: false   # e.g. order-service-xxxx.onrender.com
      - key: ORDER_SERVICE_PORT
        value: "443"
      - key: PAYMENT_SERVICE_HOST
        sync: false   # e.g. payment-service-xxxx.onrender.com
      - key: PAYMENT_SERVICE_PORT
        value: "443"
      - key: NOTIFICATION_SERVICE_HOST
        sync: false   # e.g. notification-service-xxxx.onrender.com
      - key: NOTIFICATION_SERVICE_PORT
        value: "443"
      - key: FRONTEND_URL
        sync: false   # e.g. https://modular-mart-microservices-web.vercel.app
      # GATEWAY_INTERNAL_SECRET must be explicitly listed here so that envsubst
      # in entrypoint.sh can substitute it into kong.yml. The fromGroup below
      # sets it in the container, but explicit listing makes the dependency clear.
      - key: GATEWAY_INTERNAL_SECRET
        sync: false
      - fromGroup: shared-infra

  # ─── User Service ─────────────────────────────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/user-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/user-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: CLERK_WEBHOOK_SECRET
        sync: false

  # ─── Catalog Service ──────────────────────────────────────────────────────────
  - type: web
    name: catalog-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/catalog-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/catalog-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3005"
      - key: DATABASE_URL
        sync: false

  # ─── Order Service ────────────────────────────────────────────────────────────
  - type: web
    name: order-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/order-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/order-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3002"
      - key: DATABASE_URL
        sync: false
      - key: USER_SERVICE_URL
        # Public Render URL — free tier has no private networking
        # Replace with your actual user-service .onrender.com hostname
        sync: false

  # ─── Payment Service ──────────────────────────────────────────────────────────
  - type: web
    name: payment-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/payment-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/payment-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3004"
      - key: DATABASE_URL
        sync: false
      - key: ORDER_SERVICE_URL
        # Public Render URL — free tier has no private networking
        # Replace with your actual order-service .onrender.com hostname
        sync: false

  # ─── Notification Service ─────────────────────────────────────────────────────
  - type: web
    name: notification-service
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/notification-service/Dockerfile
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /health/live
    buildFilter:
      paths:
        - apps/notification-service/**
        - packages/**
        - pnpm-lock.yaml
    envVars:
      - fromGroup: shared-infra
      - key: PORT
        value: "3003"
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
