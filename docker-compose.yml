services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3200:3000"
    volumes:
      - ./docker/grafana-provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # App Services
  user-service:
    labels:
      logging: "true"
      service_name: "user-service"
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    env_file:
      - apps/user-service/.env
    environment:
      - LOG_PRETTY=false
      - SERVICE_NAME=user-service
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-ecommerce-internal-trust-2026-xyz}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACES_ENABLED=true
      - OTEL_METRICS_EXPORTER=none
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "3001:3001"

  catalog-service:
    labels:
      logging: "true"
      service_name: "catalog-service"
    build:
      context: .
      dockerfile: apps/catalog-service/Dockerfile
    env_file:
      - apps/catalog-service/.env
    environment:
      - LOG_PRETTY=false
      - SERVICE_NAME=catalog-service
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-ecommerce-internal-trust-2026-xyz}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACES_ENABLED=true
      - OTEL_METRICS_EXPORTER=none
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "3005:3005"

  order-service:
    labels:
      logging: "true"
      service_name: "order-service"
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    env_file:
      - apps/order-service/.env
    environment:
      - LOG_PRETTY=false
      - SERVICE_NAME=order-service
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-ecommerce-internal-trust-2026-xyz}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACES_ENABLED=true
      - OTEL_METRICS_EXPORTER=none
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "3002:3002"

  payment-service:
    labels:
      logging: "true"
      service_name: "payment-service"
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    env_file:
      - apps/payment-service/.env
    environment:
      - LOG_PRETTY=false
      - SERVICE_NAME=payment-service
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-ecommerce-internal-trust-2026-xyz}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACES_ENABLED=true
      - OTEL_METRICS_EXPORTER=none
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "3004:3004"

  notification-service:
    labels:
      logging: "true"
      service_name: "notification-service"
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    env_file:
      - apps/notification-service/.env
    environment:
      - LOG_PRETTY=false
      - SERVICE_NAME=notification-service
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-ecommerce-internal-trust-2026-xyz}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACES_ENABLED=true
      - OTEL_METRICS_EXPORTER=none
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "3006:3005"

  kong:
    build:
      context: ./apps/kong-gateway
      dockerfile: Dockerfile
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET:-ecommerce-internal-trust-2026-xyz}
      # Service hostnames — used by entrypoint.sh envsubst to populate kong.yml
      USER_SERVICE_HOST: user-service
      CATALOG_SERVICE_HOST: catalog-service
      ORDER_SERVICE_HOST: order-service
      PAYMENT_SERVICE_HOST: payment-service
      NOTIFICATION_SERVICE_HOST: notification-service
      # Kong tuning
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_NGINX_WORKER_PROCESSES: "1"
    depends_on:
      user-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "8000:8000"
      - "127.0.0.1:8001:8001"
    restart: unless-stopped

  api-gateway:
    profiles: ["legacy-gateway"]
    labels:
      logging: "true"
      service_name: "api-gateway"
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    env_file:
      - apps/api-gateway/.env
    environment:
      - LOG_PRETTY=false
      - SERVICE_NAME=api-gateway
      - GATEWAY_INTERNAL_SECRET=${GATEWAY_INTERNAL_SECRET:-ecommerce-internal-trust-2026-xyz}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACES_ENABLED=true
      - OTEL_METRICS_EXPORTER=none
      - USER_SERVICE_URL=http://user-service:3001
      - CATALOG_SERVICE_URL=http://catalog-service:3005
      - ORDER_SERVICE_URL=http://order-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
    depends_on:
      user-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"
